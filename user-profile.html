<!doctype html>
<html lang="en">
  <head>
    <title>User Profile Page</title>
    <link rel="icon" type="image/png" sizes="32x32" href="" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="User Profile Page" />

    <script
      src="https://kit.fontawesome.com/e0e8f3b90b.js"
      crossorigin="anonymous"
    ></script>

    <link rel="stylesheet" href="css/styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Radley:ital@0;1&family=Rasa:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="border-b border-zinc-200 bg-white font-rasa">
      <nav class="mx-auto max-w-6xl px-4 py-4">
        <!-- TOP ROW -->
        <div class="flex items-center justify-between">
          <!-- LEFT -->
          <div class="flex items-center gap-3">
            <a
              href="./index.html"
              class="rounded-full bg-zinc-200 px-5 py-1 text-sm md:text-xl tracking-wide"
            >
              AUCTION HOUSE
            </a>

            <button
              id="searchToggle"
              type="button"
              class="inline-flex h-8 w-8 md:h-10 md:w-10 items-center justify-center rounded-full bg-zinc-200 hover:bg-zinc-300 transition"
              aria-label="Search"
              aria-controls="searchForm"
              aria-expanded="false"
            >
              <i class="fas fa-search"></i>
            </button>

            <!-- Create + (logged in only) -->
            <a
              id="navCreate"
              href="./create-listing.html"
              class="hidden h-10 w-10 items-center justify-center rounded-full bg-zinc-200 hover:bg-zinc-300 transition"
              aria-label="Create listing"
            >
              <i class="fas fa-plus"></i>
            </a>
          </div>

          <!-- DESKTOP: Logged OUT -->
          <div id="navLoggedOut" class="hidden items-center">
            <div
              class="flex items-center gap-2 h-10 justify-center rounded-full bg-zinc-200 px-5 text-sm hover:bg-zinc-300 transition"
            >
              <a
                href="./login.html"
                class="inline-flex h-10 items-center justify-center rounded-full px-5 text-sm hover:font-extrabold"
                aria-label="Log in"
              >
                LOG IN
              </a>
              <span class="text-zinc-500">|</span>
              <a
                href="./register.html"
                class="inline-flex h-10 items-center justify-center rounded-full px-5 text-sm hover:font-extrabold"
                aria-label="Sign up"
              >
                SIGN UP
              </a>
            </div>
          </div>

          <!-- DESKTOP: Logged IN -->
          <div id="navLoggedIn" class="hidden items-center gap-2">
            <span
              id="navCredits"
              class="inline-flex h-10 items-center justify-center rounded-full bg-zinc-200 px-5 text-sm font-semibold"
            >
              0 $
            </span>

            <a
              href="./user-profile.html"
              class="inline-flex h-10 items-center justify-center rounded-full bg-zinc-200 px-5 text-sm hover:bg-zinc-300 transition"
            >
              PROFILE
            </a>

            <button
              id="logoutBtn"
              type="button"
              class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-zinc-200 hover:bg-zinc-300 transition"
              aria-label="Log out"
            >
              <i class="fas fa-right-from-bracket"></i>
            </button>
          </div>

          <!-- MOBILE ICON: Profile (only logged in) -->
          <span
            id="mobileCreditsTop"
            class="hidden h-10 items-center justify-center rounded-full bg-zinc-200 px-5 text-sm font-semibold"
          >
            0 $
          </span>
          <div class="flex items-center gap-2 md:hidden">
            <a
              id="mobileProfileIcon"
              href="./user-profile.html"
              class="hidden h-8 w-8 items-center justify-center rounded-full bg-zinc-200 hover:bg-zinc-300 transition"
              aria-label="Profile"
            >
              <i class="fas fa-user"></i>
            </a>

            <!-- MOBILE: Hamburger -->
            <button
              id="navMenu"
              type="button"
              class="inline-flex md:hidden h-8 w-8 items-center justify-center rounded-full bg-zinc-200 hover:bg-zinc-300 transition"
              aria-label="Open menu"
              aria-controls="mobileMenu"
              aria-expanded="false"
            >
              <i class="fas fa-bars"></i>
            </button>
          </div>
        </div>

        <!-- search overlay -->
        <div
          id="searchOverlay"
          class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm"
        >
          <form
            id="searchForm"
            class="w-[90%] max-w-lg rounded-3xl bg-white p-6 shadow-xl"
          >
            <div class="flex items-center gap-3">
              <input
                type="search"
                id="searchInput"
                placeholder="Search Listings"
                class="w-full rounded-full border border-zinc-200 bg-zinc-100 px-5 py-3 text-base outline-none focus:ring-2 focus:ring-zinc-300"
              />
              <button
                type="submit"
                class="rounded-full bg-zinc-200 px-5 py-3 text-sm font-semibold hover:bg-zinc-300 transition"
              >
                Search
              </button>
            </div>
            <div
              id="searchResults"
              class="mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 xl:grid-cols-2 gap-4 max-h-[70vh] overflow-y-auto pr-2"
            ></div>
          </form>
        </div>

        <!-- MOBILE MENU PANEL (UNDER ROW) -->
        <div
          id="mobileMenu"
          class="hidden mt-3 rounded-xl border border-zinc-200 bg-white p-3"
        >
          <!-- Logged OUT -->
          <div id="mobileLoggedOut">
            <a
              href="./login.html"
              class="block rounded-lg px-4 py-3 text-sm font-semibold hover:bg-zinc-100"
              >LOG IN</a
            >
            <a
              href="./register.html"
              class="mt-1 block rounded-lg px-4 py-3 text-sm font-semibold hover:bg-zinc-100"
              >SIGN UP</a
            >
          </div>

          <!-- Logged IN -->
          <div id="mobileLoggedIn" class="hidden">
            <div class="mb-1 rounded-lg bg-zinc-50 px-4 py-3 text-sm">
              Credits: <span id="mobileCredits" class="font-semibold">0</span> $
            </div>

            <a
              href="./user-profile.html"
              class="block rounded-lg px-4 py-3 text-sm font-semibold hover:bg-zinc-100"
              >PROFILE</a
            >
            <a
              href="./create-listing.html"
              class="mt-1 block rounded-lg px-4 py-3 text-sm font-semibold hover:bg-zinc-100"
              >CREATE LISTING</a
            >
            <button
              id="mobileLogoutBtn"
              type="button"
              class="mt-1 w-full rounded-lg px-4 py-3 text-left text-sm font-semibold hover:bg-zinc-100"
            >
              LOG OUT
            </button>
          </div>
        </div>
      </nav>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-8 font-rasa">
      <section
        class="rounded-3xl border border-zinc-200 bg-white overflow-hidden"
      >
        <div class="relative h-36 sm:h-44 bg-zinc-100">
          <img
            id="profileBanner"
            class="absolute inset-0 h-full w-full object-cover"
            alt="Profile banner"
            loading="lazy"
          />
          <div class="absolute -bottom-10 left-6">
            <div
              class="h-24 w-24 rounded-full bg-white p-2 shadow-sm border border-zinc-200"
            >
              <img
                id="profileAvatar"
                class="h-full w-full rounded-full object-cover"
                alt="Profile avatar"
                loading="lazy"
              />
            </div>
          </div>

          <div class="absolute right-6 top-4">
            <span
              class="inline-flex items-center rounded-full bg-white/90 border border-zinc-200 px-4 py-2 text-sm font-semibold"
            >
              <span id="creditsValue">0</span> $
            </span>
          </div>
        </div>

        <div class="pt-14 pb-6 px-6">
          <h1 id="profileTitle" class="text-xl sm:text-2xl font-semibold">
            User
          </h1>
          <p
            id="profileBio"
            class="mt-2 text-sm text-zinc-600 whitespace-pre-wrap"
          >
            No bio yet.
          </p>

          <div class="mt-4 flex flex-wrap items-center gap-2">
            <button
              id="refreshCredits"
              class="border p-2 rounded-full bg-zinc-200 hover:bg-zinc-300 transition text-sm font-semibold"
            >
              Refresh
            </button>
            <p id="creditsMsg" class="text-sm"></p>
          </div>
        </div>
      </section>

      <section class="mt-8 grid gap-6 lg:grid-cols-[220px_1fr]">
        <aside class="rounded-3xl border border-zinc-200 bg-white p-4 h-fit">
          <p class="text-xs font-semibold tracking-widest text-zinc-500">
            Dashboard
          </p>

          <div class="mt-3 grid gap-2">
            <button
              data-tab="listings"
              class="tabBtn w-full text-left rounded-2xl border border-zinc-200 bg-zinc-50 px-4 py-3 text-sm font-semibold hover:bg-zinc-100"
              type="button"
            >
              My Listings
            </button>

            <button
              data-tab="bids"
              class="tabBtn w-full text-left rounded-2xl border border-zinc-200 bg-zinc-50 px-4 py-3 text-sm font-semibold hover:bg-zinc-100"
              type="button"
            >
              My Bids
            </button>
          </div>
        </aside>

        <div class="min-h-60">
          <div id="tabListings" class="tabPanel">
            <h2 class="text-lg font-semibold">My Listings</h2>
            <p class="mt-1 text-sm text-zinc-500">Listings you created</p>

            <div
              id="myListingsGrid"
              class="mt-4 grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"
            ></div>

            <div
              id="tabBids"
              class="tabPanel hidden">
            <h2 class="text-lg font-semibold">My Bids</h2>
            <p class="mt-1 text-sm text-zinc-500">Bids you placed</p>
            <div
              id="myBidsGrid"
              class="mt-4 grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"
            ></div>
            </div>
        </div>
      </section>
    </main>
    <script type="module" src="./script/pages/profile.js"></script>
  </body>
</html>
