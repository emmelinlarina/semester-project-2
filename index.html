<!doctype html>
<html lang="en">
  <head>
    <title>Home Page</title>
    <link rel="icon" type="image/png" sizes="32x32" href="" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Home Page" />

    <script
      src="https://kit.fontawesome.com/e0e8f3b90b.js"
      crossorigin="anonymous"
    ></script>

    <link rel="stylesheet" href="./css/styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Radley:ital@0;1&family=Rasa:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-white text-zinc-900 font-radley">
    <header class="border-b border-zinc-200 bg-white">
      <nav class="mx-auto max-w-6xl px-4 py-4">
        <!-- TOP ROW -->
        <div class="flex items-center justify-between">
          <!-- LEFT -->
          <div class="flex items-center gap-3">
            <a
              href="./index.html"
              class="rounded-full bg-zinc-200 px-5 py-1 text-sm md:text-xl tracking-wide"
            >
              AUCTION HOUSE
            </a>

            <button
              id="searchToggle"
              type="button"
              class="inline-flex h-8 w-8 md:h-10 md:w-10 items-center justify-center rounded-full bg-zinc-200 hover:bg-zinc-300 transition"
              aria-label="Search"
              aria-controls="searchForm"
              aria-expanded="false"
            >
              <i class="fas fa-search"></i>
            </button>

            <!-- Create + (logged in only) -->
            <a
              id="navCreate"
              href="./create-listing.html"
              class="hidden h-10 w-10 items-center justify-center rounded-full bg-zinc-200 hover:bg-zinc-300 transition"
              aria-label="Create listing"
            >
              <i class="fas fa-plus"></i>
            </a>
          </div>

          <!-- DESKTOP: Logged OUT -->
          <div id="navLoggedOut" class="hidden items-center">
            <div
              class="flex items-center gap-2 h-10 justify-center rounded-full bg-zinc-200 px-5 text-sm hover:bg-zinc-300 transition"
            >
              <a
                href="./login.html"
                class="inline-flex h-10 items-center justify-center rounded-full px-5 text-sm hover:font-extrabold"
                aria-label="Log in"
              >
                LOG IN
              </a>
              <span class="text-zinc-500">|</span>
              <a
                href="./register.html"
                class="inline-flex h-10 items-center justify-center rounded-full px-5 text-sm hover:font-extrabold"
                aria-label="Sign up"
              >
                SIGN UP
              </a>
            </div>
          </div>

          <!-- DESKTOP: Logged IN -->
          <div id="navLoggedIn" class="hidden items-center gap-2">
            <span
              id="navCredits"
              class="inline-flex h-10 items-center justify-center rounded-full bg-zinc-200 px-5 text-sm font-semibold"
            >
              0 $
            </span>

            <a
              href="./user-profile.html"
              class="inline-flex h-10 items-center justify-center rounded-full bg-zinc-200 px-5 text-sm hover:bg-zinc-300 transition"
            >
              PROFILE
            </a>

            <button
              id="logoutBtn"
              type="button"
              class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-zinc-200 hover:bg-zinc-300 transition"
              aria-label="Log out"
            >
              <i class="fas fa-right-from-bracket"></i>
            </button>
          </div>

          <!-- MOBILE ICON: Profile (only logged in) -->
          <span
            id="mobileCreditsTop"
            class="hidden h-10 items-center justify-center rounded-full bg-zinc-200 px-5 text-sm font-semibold"
          >
            0 $
          </span>
          <div class="flex items-center gap-2 md:hidden">
            <a
              id="mobileProfileIcon"
              href="./user-profile.html"
              class="hidden h-8 w-8 items-center justify-center rounded-full bg-zinc-200 hover:bg-zinc-300 transition"
              aria-label="Profile"
            >
              <i class="fas fa-user"></i>
            </a>

            <!-- MOBILE: Hamburger -->
            <button
              id="navMenu"
              type="button"
              class="inline-flex md:hidden h-8 w-8 items-center justify-center rounded-full bg-zinc-200 hover:bg-zinc-300 transition"
              aria-label="Open menu"
              aria-controls="mobileMenu"
              aria-expanded="false"
            >
              <i class="fas fa-bars"></i>
            </button>
          </div>
        </div>

        <!-- search overlay -->
        <div
          id="searchOverlay"
          class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm"
        >
          <form
            id="searchForm"
            class="w-[90%] max-w-lg rounded-3xl bg-white p-6 shadow-xl"
          >
            <div class="flex items-center gap-3">
              <input
                type="search"
                id="searchInput"
                placeholder="Search Listings"
                class="w-full rounded-full border border-zinc-200 bg-zinc-100 px-5 py-3 text-base outline-none focus:ring-2 focus:ring-zinc-300"
              />
              <button
                type="submit"
                class="rounded-full bg-zinc-200 px-5 py-3 text-sm font-semibold hover:bg-zinc-300 transition"
              >
                Search
              </button>
            </div>
            <div
              id="searchResults"
              class="mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 xl:grid-cols-2 gap-4 max-h-[70vh] overflow-y-auto pr-2"
            ></div>
          </form>
        </div>

        <!-- MOBILE MENU PANEL (UNDER ROW) -->
        <div
          id="mobileMenu"
          class="hidden mt-3 rounded-xl border border-zinc-200 bg-white p-3"
        >
          <!-- Logged OUT -->
          <div id="mobileLoggedOut">
            <a
              href="./login.html"
              class="block rounded-lg px-4 py-3 text-sm font-semibold hover:bg-zinc-100"
              >LOG IN</a
            >
            <a
              href="./register.html"
              class="mt-1 block rounded-lg px-4 py-3 text-sm font-semibold hover:bg-zinc-100"
              >SIGN UP</a
            >
          </div>

          <!-- Logged IN -->
          <div id="mobileLoggedIn" class="hidden">
            <div class="mb-1 rounded-lg bg-zinc-50 px-4 py-3 text-sm">
              Credits: <span id="mobileCredits" class="font-semibold">0</span> $
            </div>

            <a
              href="./user-profile.html"
              class="block rounded-lg px-4 py-3 text-sm font-semibold hover:bg-zinc-100"
              >PROFILE</a
            >
            <a
              href="./create-listing.html"
              class="mt-1 block rounded-lg px-4 py-3 text-sm font-semibold hover:bg-zinc-100"
              >CREATE LISTING</a
            >
            <button
              id="mobileLogoutBtn"
              type="button"
              class="mt-1 w-full rounded-lg px-4 py-3 text-left text-sm font-semibold hover:bg-zinc-100"
            >
              LOG OUT
            </button>
          </div>
        </div>
      </nav>
    </header>

    <!-- brand / img -->
    <main class="mx-auto max-w-6xl px-4 py-8 font-rasa">
      <section
        class="rounded-3xl bg-zinc-100 border border-zinc-200 flex flex-col items-start justify-center px-6 py-4"
      >
        <h1 class="text-3xl sm:text-4xl md:text-5xl tracking-wide">BRAND</h1>
      </section>

      <!-- highlighted auctions -->
      <section class="mt-10 font-rasa">
        <div class="flex items-center justify-between">
          <h2 class="text-xl font-semibold tracking-widest text-zinc-700">
            HIGHLIGHTED AUCTIONS
          </h2>
        </div>
        <div
          class="mt-4 grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"
          id="highlightedGrid"
        ></div>
      </section>

      <!-- gallery -->
      <section class="mt-12 font-rasa">
        <div class="flex items-center justify-between">
          <h2 class="text-xl font-semibold tracking-widest text-zinc-700">
            GALLERY
          </h2>
          <p id="searchStatus" class="mt-2 text-sm text-zinc-500"></p>
        </div>

        <div class="flex items-center gap-2">
          <span class="text-xs text-zinc-500">SORT BY</span>
          <select
            id="sortSelect"
            class="rounded-full bg-zinc-100 border border-zinc-200 px-3 py-2 text-sm"
          >
            <option value="endsSoon">Ending soon</option>
            <option value="endsLate">Ending late</option>
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
          </select>
        </div>

        <!-- gallery search -->
        <form id="gallerySearchForm" class="flex items-center gap-2">
          <input
            type="search"
            id="gallerySearchInput"
            placeholder="Search gallery"
            class="w-full sm:w-56 rounded-full border border-zinc-200 bg-zinc-100 px-5 py-2 text-sm outline-none focus:ring-2 focus:ring-zinc-300"
          />
          <button
            type="submit"
            class="rounded-full bg-zinc-200 px-4 py-2 text-sm font-semibold hover:bg-zinc-300 transition"
          >
            Search
          </button>
          <button
            id="galleryClearBtn"
            type="button"
            class="rounded-full bg-zinc-100 px-4 py-2 text-sm hover:bg-zinc-200 transition"
          >
            Clear
          </button>
        </form>

        <div
          class="mt-4 grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"
          id="galleryGrid"
        ></div>
        <!-- Pagination -->
        <div class="mt-6 flex items-center justify-center gap-4">
          <button
            id="prevBtn"
            class="rounded-full bg-zinc-200 px-6 py-2 text-sm font-semibold hover:bg-zinc-300 transition disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Previous
          </button>
          <span id="pageNumber" class="text-sm font-semibold">1</span>
          <button
            id="nextBtn"
            class="rounded-full bg-zinc-200 px-6 py-2 text-sm font-semibold hover:bg-zinc-300 transition disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Next
          </button>
        </div>
      </section>
    </main>

    <script type="module" src="./script/pages/home.js"></script>
  </body>
</html>
